<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Diary</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img src="C:\Users\ushar\Simpleproject\pencil hand copy.jpg" class="hand-pencil">

    <!-- Book -->
    <div class="book">

        <!-- Bookmark -->
        <div class="bookmark"></div>

        <!-- Left Page -->
        <div class="page left-page">

            <h1>My Diary</h1>

            <p class="date">
                Monday, 29 June 2026
            </p>

            <div class="quote">
                "Every day is a new page in your life."
            </div>

            <div class="writing-lines">

                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>

            </div>

        </div>

        <!-- Center Fold -->
        <div class="center-line"></div>

        <!-- Right Page -->
        <div class="page right-page">

            <h2>Today's Thoughts</h2>

            <p class="content">

                Today was a beautiful day.
                <br><br>

                I learned something new,
                worked on my goals,
                and became a little better
                than yesterday.

                <br><br>

                Tomorrow is another opportunity
                to grow.

            </p>

            <div class="signature">

                - My Diary

            </div>

        </div>

    </div>

</body>
</html>
